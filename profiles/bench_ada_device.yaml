# Client (device) config for the SEV vs non-SEV ada benchmark. See
# notes/ada_sev_benchmark_plan.md. Same plugin list as profiles/ada_device.yaml,
# with env_vars pinned to the TUM fr1_desk dataset this benchmark uses and
# ILLIXR_TCP_SERVER_IP pointed at the hypervisor's public IP (DNAT'd to
# whichever VM/condition is currently up), matching
# bench_offload_vio_device.yaml's convention. --duration is passed on the
# CLI by the orchestration script, not set here (see the plan doc for why
# the yaml env_vars: duration key doesn't work).
plugins: ada.offline_scannet,tcp_network_backend,ada.device_tx,ada.device_rx,ada.mesh_decompression_grey,ada.scene_management
env_vars:
  ILLIXR_DATA: /home/illixr/ILLIXR/data/tum_fr1_desk
  FRAME_COUNT: 596
  FPS: 15
  PARTIAL_MESH_COUNT: 8
  MESH_DECOMPRESS_PARALLELISM: 8
  ILLIXR_TCP_SERVER_IP: 10.193.124.49
  ILLIXR_TCP_SERVER_PORT: 39510
  ILLIXR_IS_CLIENT: 1
